<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>CPA 考点通关 - 经济法×战略</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;transition:background .3s,color .3s}
:root{--bg:#f0f2f5;--card:#fff;--text:#1a1a2e;--text2:#636e72;--text3:#999;--pri:#6c5ce7;--pri2:#a29bfe;--pri3:#dfe6e9;--green:#00b894;--orange:#fdcb6e;--red:#e17055;--blue:#0984e3;--pink:#fd79a8;--shadow:0 4px 16px rgba(108,92,231,.12);--radius:14px;--border:#e8e8e8}
.dark{--bg:#0f0f1a;--card:#1a1a2e;--text:#e8e8e8;--text2:#a0a0b0;--text3:#666;--pri:#a29bfe;--pri2:#6c5ce7;--pri3:#2d2d3e;--border:#2a2a3a;--shadow:0 4px 16px rgba(0,0,0,.3)}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);padding:0 0 80px 0;min-height:100vh;overflow-x:hidden}
.top{position:sticky;top:0;z-index:100;background:var(--card);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.top h1{font-size:17px;font-weight:700;background:linear-gradient(135deg,var(--pri),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-actions{display:flex;gap:6px}
.top-actions button{background:var(--bg);border:none;width:34px;height:34px;border-radius:50%;font-size:15px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center}
.sub-bar{position:sticky;top:52px;z-index:99;background:var(--card);display:flex;padding:6px 12px;gap:6px;overflow-x:auto;border-bottom:1px solid var(--border)}
.sub-bar div{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);background:var(--bg);transition:all .2s}
.sub-bar div.active{background:var(--pri);color:#fff}
.sub-bar div .ct{font-size:10px;margin-left:4px;opacity:.7}
.scroll-wrap{display:none;padding:12px 14px 20px}
.scroll-wrap.show{display:block}
.search-row{padding:0 14px 10px}
.search-row input{width:100%;padding:11px 16px;border:2px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--card);color:var(--text);outline:none}
.search-row input:focus{border-color:var(--pri)}
.stat-row{padding:0 14px 10px;display:flex;gap:8px;font-size:12px;color:var(--text2);flex-wrap:wrap}
.stat-row span{background:var(--card);padding:4px 12px;border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
/* mind-map card */
.mind{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;border:1px solid var(--border)}
.mind-hd{padding:16px 16px 12px;display:flex;align-items:center;gap:10px;cursor:pointer}
.mind-hd .ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.mind-hd .info{flex:1}
.mind-hd .info .nm{font-size:15px;font-weight:700}
.mind-hd .info .sub{font-size:11px;color:var(--text2);margin-top:2px}
.mind-hd .bar-wrap{width:60px;height:4px;background:var(--bg);border-radius:2px;overflow:hidden;flex-shrink:0}
.mind-hd .bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--green),var(--pri));transition:width .5s}
.mind-hd .arr{font-size:12px;color:var(--text2);transform:rotate(0);transition:transform .3s;flex-shrink:0}
.mind-hd .arr.open{transform:rotate(180deg)}
.mind-bd{display:none;padding:0 16px 16px}
.mind-bd.open{display:block}
.knot{background:var(--bg);border-radius:10px;padding:14px;margin-bottom:10px;border-left:3px solid var(--pri);position:relative;cursor:pointer}
.knot:last-child{margin-bottom:0}
.knot .kw{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.knot .kw .tag{font-size:10px;background:var(--pri2);color:#fff;padding:1px 8px;border-radius:10px;font-weight:400}
.knot .life{display:none;margin-top:10px;padding:10px 12px;background:var(--card);border-radius:8px;border:1px dashed var(--pri2);font-size:13px;line-height:1.7;color:var(--text2)}
.knot .life .lb{font-size:11px;color:var(--pri);font-weight:600;margin-bottom:4px}
.knot .life.show{display:block}
.knot .detail{display:none;margin-top:8px;font-size:12px;line-height:1.7;color:var(--text2)}
.knot .detail.show{display:block}
.knot .foot{display:flex;gap:10px;margin-top:8px;align-items:center;font-size:11px}
.knot .foot .btn{color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:4px}
.knot .foot .btn:hover{color:var(--pri)}
.knot .foot .btn.star{color:var(--text3)}
.knot .foot .btn.star.on{color:var(--orange)}
.knot .foot .btn.mem{color:var(--text3)}
.knot .foot .btn.mem.on{color:var(--green)}
.knot .foot .btn.weak{color:var(--text3)}
.knot .foot .btn.weak.on{color:var(--red)}
.knot .foot .btn.mind{color:var(--text3)}
.knot.memo{border-left-color:var(--green)}
.knot.memo::after{content:'✓';position:absolute;top:12px;right:12px;color:var(--green);font-weight:700;font-size:14px}
.knot.weak{border-left-color:var(--red)}
.knot.starred{border-left-color:var(--orange)}
.mode-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;margin-left:4px}
.mode-badge.m1{background:#dfe6e9;color:var(--text2)}
.mode-badge.m2{background:#ffeaa7;color:#b7950b}
.mode-badge.m3{background:#fab1a0;color:#c0392b}
/* flashcard overhaul */
.fc-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;justify-content:center;align-items:center;padding:16px}
.fc-overlay.show{display:flex}
.fc-box{background:var(--card);border-radius:20px;width:100%;max-width:400px;min-height:340px;padding:24px 20px;position:relative;box-shadow:0 12px 40px rgba(0,0,0,.3)}
.fc-close{position:absolute;top:14px;right:16px;font-size:18px;cursor:pointer;color:var(--text2);border:none;background:none;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.fc-close:hover{background:var(--bg)}
.fc-bar{text-align:center;font-size:12px;color:var(--text2);margin-bottom:10px}
.fc-head{font-size:11px;color:var(--pri);margin-bottom:2px}
.fc-ch{font-size:11px;color:var(--text2);margin-bottom:14px}
.fc-q{font-size:18px;font-weight:700;line-height:1.5;margin-bottom:10px;padding:14px 0;cursor:pointer}
.fc-q .hint{font-size:13px;color:var(--text3);font-weight:400}
.fc-life{display:none;font-size:13px;line-height:1.7;color:var(--text2);background:var(--bg);border-radius:10px;padding:12px;margin-bottom:10px;border-left:3px solid var(--orange)}
.fc-life.show{display:block}
.fc-life .lb{font-size:11px;color:var(--orange);font-weight:600}
.fc-a{display:none;font-size:14px;line-height:1.8;color:var(--text);background:var(--bg);border-radius:10px;padding:14px;margin-bottom:12px}
.fc-a.show{display:block}
.fc-acts{display:flex;gap:8px;flex-wrap:wrap}
.fc-acts button{flex:1;min-width:70px;padding:10px;border:none;border-radius:10px;font-size:13px;cursor:pointer;font-weight:600}
.fc-dunno{background:var(--red);color:#fff}
.fc-know{background:var(--green);color:#fff}
.fc-next{background:var(--pri);color:#fff}
.fc-done{background:var(--pri);color:#fff}
/* progress circle */
.prog-circle{position:relative;width:60px;height:60px;margin:0 auto}
.prog-circle svg{transform:rotate(-90deg)}
.prog-circle .bg{fill:none;stroke:var(--bg);stroke-width:6}
.prog-circle .fg{fill:none;stroke:var(--pri);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 1s}
.prog-circle .num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:16px;font-weight:700}
/* bottom nav */
.bot{position:fixed;bottom:0;left:0;right:0;background:var(--card);display:flex;border-top:1px solid var(--border);z-index:100;padding:4px 0;padding-bottom:env(safe-area-inset-bottom)}
.bot div{flex:1;text-align:center;padding:6px 0;font-size:10px;color:var(--text2);cursor:pointer}
.bot div .ic{font-size:20px;display:block;margin-bottom:2px}
.bot div.active{color:var(--pri)}
/* special pages */
.spec{display:none;padding:14px}
.spec.show{display:block}
.spec .hd{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.grid-item{background:var(--card);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow);cursor:pointer}
.grid-item .num{font-size:24px;font-weight:700;color:var(--pri)}
.grid-item .lbl{font-size:12px;color:var(--text2);margin-top:4px}
/* exam questions */
.exam-wrap{display:none;padding:12px 14px}
.exam-wrap.show{display:block}
.exam-hd{font-size:16px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.exam-hd .esub{font-size:11px;background:var(--pri2);color:#fff;padding:2px 10px;border-radius:10px}
.exam-info{font-size:12px;color:var(--text2);margin-bottom:12px}
.exam-q{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px;border:1px solid var(--border)}
.exam-q .qhead{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;gap:6px}
.exam-q .qhead .qtag{font-size:10px;background:var(--orange);color:#fff;padding:1px 8px;border-radius:8px}
.exam-q .qtext{font-size:14px;line-height:1.7;margin-bottom:10px}
.exam-q .opts{display:flex;flex-direction:column;gap:6px}
.exam-q .opt{padding:10px 14px;border-radius:8px;font-size:13px;cursor:pointer;border:2px solid var(--border);background:var(--bg);transition:all .2s}
.exam-q .opt:hover{border-color:var(--pri2)}
.exam-q .opt.sel{border-color:var(--pri);background:var(--pri);color:#fff}
.exam-q .opt.cor{border-color:var(--green);background:var(--green);color:#fff}
.exam-q .opt.wro{border-color:var(--red);background:var(--red);color:#fff}
.exam-q .opt.dis{cursor:default;pointer-events:none}
.exam-q .explain{display:none;margin-top:10px;padding:12px;background:var(--bg);border-radius:8px;border-left:3px solid var(--pri);font-size:12px;line-height:1.7;color:var(--text2)}
.exam-q .explain.show{display:block}
.exam-q .explain .elb{font-size:11px;color:var(--pri);font-weight:600;margin-bottom:4px}
.exam-q .explain .eans{color:var(--green);font-weight:700}
.exam-q .explain .elif{display:block;margin-top:6px;padding:8px;background:var(--card);border-radius:6px;border:1px dashed var(--orange);font-size:12px}
.exam-nav{display:flex;gap:8px;justify-content:center;padding:8px 0 20px}
.exam-nav button{padding:8px 20px;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}
.exam-nav .eprev{background:var(--bg);color:var(--text2)}
.exam-nav .enext{background:var(--pri);color:#fff}
.exam-nav .esubmit{background:var(--green);color:#fff}
.exam-empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px}
/* mashup */
.mash-wrap{display:none;padding:12px 14px}
.mash-wrap.show{display:block}
.mash-hd{font-size:16px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.mash-hd .msub{font-size:11px;background:var(--pink);color:#fff;padding:2px 10px;border-radius:10px}
.mash-stat{display:flex;gap:8px;margin-bottom:12px;font-size:12px;color:var(--text2);flex-wrap:wrap}
.mash-stat span{background:var(--card);padding:6px 14px;border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.mash-box{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:12px;border:1px solid var(--border)}
.mash-box .m-sub{font-size:11px;color:var(--pri);margin-bottom:2px}
.mash-box .m-ch{font-size:11px;color:var(--text3);margin-bottom:12px}
.mash-box .m-q{font-size:18px;font-weight:700;line-height:1.5}
.mash-box .m-life{display:none;margin-top:12px;padding:12px;background:var(--bg);border-radius:8px;border-left:3px solid var(--orange);font-size:13px;line-height:1.7}
.mash-box .m-life.show{display:block}
.mash-box .m-life .mlb{font-size:11px;color:var(--orange);font-weight:600}
.mash-box .m-detail{display:none;margin-top:10px;padding:14px;background:var(--bg);border-radius:10px;font-size:13px;line-height:1.7}
.mash-box .m-detail.show{display:block}
.mash-box .m-hint{text-align:center;color:var(--text3);font-size:13px;margin:8px 0;cursor:pointer}
.mash-acts{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.mash-acts button{flex:1;min-width:70px;padding:10px;border:none;border-radius:10px;font-size:13px;cursor:pointer;font-weight:600}
.mash-acts .mknow{background:var(--green);color:#fff}
.mash-acts .mdunno{background:var(--red);color:#fff}
.mash-acts .mskip{background:var(--pri);color:#fff}
.mash-acts .mdone{background:var(--pri);color:#fff}
.mash-streak{text-align:center;font-size:12px;color:var(--text2);margin-top:8px}
.mash-streak .fire{color:var(--orange);font-size:16px}
/* compare cards */
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.comp-card{background:var(--card);border-radius:var(--radius);padding:14px;border:1px solid var(--border);box-shadow:var(--shadow)}
.comp-card .c-hd{font-size:12px;font-weight:700;margin-bottom:6px;padding-bottom:6px;border-bottom:2px solid var(--pri2)}
.comp-card .c-item{font-size:11px;color:var(--text2);padding:3px 0;line-height:1.5}
.comp-card .c-item b{color:var(--text)}
.mash-picker{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.mash-picker div{padding:6px 14px;border-radius:16px;font-size:12px;cursor:pointer;background:var(--card);color:var(--text2);border:1px solid var(--border);transition:all .2s}
.mash-picker div.active{background:var(--pri);color:#fff;border-color:var(--pri)}
/* framework */
.fw-wrap{display:none;padding:12px 14px}
.fw-wrap.show{display:block}
.fw-top{background:linear-gradient(135deg,var(--pri),var(--pink));border-radius:var(--radius);padding:18px;color:#fff;margin-bottom:14px;box-shadow:0 4px 16px rgba(108,92,231,.25)}
.fw-top .fwnm{font-size:17px;font-weight:700;margin-bottom:4px}
.fw-top .fwdesc{font-size:12px;opacity:.9;line-height:1.5}
.fw-top .fwstat{display:flex;gap:12px;margin-top:8px;font-size:11px}
.fw-top .fwstat span{background:rgba(255,255,255,.2);padding:3px 10px;border-radius:12px}
.fw-path{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.fw-path div{padding:5px 12px;border-radius:16px;font-size:11px;cursor:pointer;background:var(--card);color:var(--text2);border:1px solid var(--border);transition:all .2s}
.fw-path div.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.fw-ch{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px;border:1px solid var(--border);border-left:4px solid var(--pri);cursor:pointer}
.fw-ch:active{transform:scale(.99)}
.fw-ch .fchd{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.fw-ch .fchd .fnum{font-size:20px;font-weight:800;color:var(--pri)}
.fw-ch .fchd .fname{font-size:15px;font-weight:700;flex:1}
.fw-ch .fchd .fstar{font-size:12px;color:var(--orange)}
.fw-ch .fess{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:6px}
.fw-ch .fmeta{display:flex;gap:6px;flex-wrap:wrap;font-size:10px;margin-bottom:4px}
.fw-ch .fmeta span{background:var(--bg);padding:2px 8px;border-radius:8px}
.fw-ch .fmeta .fw{background:var(--pri2);color:#fff}
.fw-ch .fmeta .fdiff{background:var(--orange);color:#fff}
.fw-ch .fqslink{display:none;margin-top:8px;padding:8px 10px;background:var(--bg);border-radius:8px;font-size:11px;line-height:1.6;color:var(--text2)}
.fw-ch .fqslink.show{display:block}
.fw-ch .fqslink b{color:var(--pri)}
.fw-ch .ftip{display:none;margin-top:6px;padding:8px 10px;background:#ffeaa7;border-radius:6px;font-size:11px;color:#6b5900;line-height:1.5}
.fw-ch .ftip.show{display:block}
.fw-bigq{display:none;margin-top:6px;padding:8px 10px;background:var(--card);border-radius:6px;border:1px dashed var(--pri2);font-size:11px;line-height:1.6;color:var(--text2)}
.fw-bigq.show{display:block}
.fw-bigq .bqlb{color:var(--pri);font-weight:600}
.fw-roadmap{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.fw-roadmap .rhd{font-size:14px;font-weight:700;margin-bottom:10px}
.fw-roadmap .rstep{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.fw-roadmap .rstep .rnum{width:24px;height:24px;border-radius:12px;background:var(--pri);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fw-roadmap .rstep .rtxt{font-size:12px;color:var(--text2);line-height:1.5;flex:1}
.fw-roadmap .rstep .rtxt b{color:var(--text)}
/* login overlay */
.login-overlay{display:flex;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:999;justify-content:center;align-items:center;padding:20px}
.login-overlay.hidden{display:none}
.login-box{background:var(--card);border-radius:20px;width:100%;max-width:360px;padding:28px 24px;box-shadow:0 12px 40px rgba(0,0,0,.3)}
.login-box .lhd{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px}
.login-box .lsub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:20px;line-height:1.5}
.login-box .linp{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:12px;font-size:16px;outline:none;background:var(--bg);color:var(--text);margin-bottom:14px}
.login-box .linp:focus{border-color:var(--pri)}
.login-box .lbtn{width:100%;padding:12px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--pri),var(--pink));color:#fff}
.login-box .lusers{margin-bottom:14px}
.login-box .lusers .lu{padding:10px 14px;border-radius:10px;font-size:14px;cursor:pointer;background:var(--bg);color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.login-box .lusers .lu:hover{background:var(--pri2);color:#fff}
.login-box .lusers .lu .luico{font-size:20px}
.login-box .lusers .lu .luname{flex:1}
.login-box .lusers .lu .ludel{font-size:12px;color:var(--red);cursor:pointer;padding:2px 6px;border-radius:4px}
.login-box .lusers .lu .ludel:hover{background:var(--red);color:#fff}
.login-box .lhint{font-size:11px;color:var(--text3);text-align:center;margin-top:10px}
</style>
</head>
<body>

<div class="top">
  <h1>🧠 CPA 考点通关</h1>
  <div class="top-actions">
    <button onclick="showLogin()" id="userBtn" title="切换用户">👤</button>
    <button onclick="toggleDark()" id="darkBtn">🌙</button>
    <button onclick="resetAll()">🔄</button>
  </div>
</div>
<div class="sub-bar" id="subBar">
  <div class="active" data-s="jjf">📜 经济法 <span class="ct" id="jjfCt">0/96</span></div>
  <div data-s="zl">🎯 战略 <span class="ct" id="zlCt">0/60</span></div>
  <div data-s="mixed">🔀 混合刷</div>
  <div data-s="exam">📝 真题</div>
  <div data-s="mashup">🔥 串烧</div>
  <div data-s="fw">📐 体系</div>
</div>
<div class="search-row"><input id="searchInp" placeholder="🔍 搜考点..."></div>
<div class="stat-row" id="statRow"></div>

<div class="scroll-wrap show" id="mainWrap"></div>
<div class="spec" id="starWrap"></div>
<div class="spec" id="weakWrap"></div>
<div class="spec" id="aboutWrap"></div>
<div class="exam-wrap" id="examWrap"></div>
<div class="mash-wrap" id="mashWrap"></div>
<div class="fw-wrap" id="fwWrap"></div>

            life:'你在公司当秘书，知道公司下周要被收购（股价会涨），赶紧自己买了股票→这就是内幕交易！\n红线：内幕信息知情人（董监高+大股东+中介）+未公开信息+买卖股票。\n记：知道机密别炒股，赚钱也要坐牢。',
            detail:'内幕信息知情人+利用未公开信息买卖/泄露/建议买卖。内幕信息：对股价有重大影响的未公开信息。' },
          { kw:'操纵市场的常见手法', tag:'重点',
            life:'就像在菜市场搞鬼：\n• 连续交易=大户一直买买买，制造"这菜很抢手"的假象\n• 约定交易=两个人互相买卖，制造虚假交易量\n• 洗售=自己卖给自己（左手倒右手）\n• 蛊惑交易=发假消息骗人接盘',
            detail:'连续交易+约定交易+洗售（自买自卖）+蛊惑交易+抢帽子交易（先买后推荐）。操纵市场可追究刑事责任。' },
          { kw:'投资者保护的"核武器"', tag:'新规',
            life:'保护小散（普通投资者）的3大法宝：\n① 代表人诉讼=你买了某垃圾股亏了，不用自己打官司，有"集体诉讼"帮你出头（默示加入）\n② 先行赔付=公司造假出事了，先赔你钱再去找公司算账\n③ 投服中心=有专门的保护机构帮你小股东说话',
            detail:'代表人诉讼（默示加入+明示退出）+先行赔付+证券集体诉讼+投服中心持股行权+普通/专业投资者分类保护。' },
          { kw:'上市公司要约收购', tag:'计算',
            life:'你想收购一家公司，已经买了30%的股份了，还想继续买→必须向所有股东发出"收购要约"（公开说我要买你们的股票）。\n期限30-60天。如果买到75%以上→公司退市。\n价格不能低于前6个月你买的最贵价格。',
            detail:'持股达30%继续收购→须发出全面或部分要约。期限30-60日。持股75%以上→退市。价格≥前6个月最高价。' },
        ]},
      { name:'第8章 企业破产法律制度', icon:'🏚️',
        points:[
          { kw:'破产原因 = "什么情况可以申请破产"', tag:'理解',
            life:'开公司亏到哪种程度可以申请破产？\n①欠钱到期还不上+总资产小于总负债（资不抵债）\n②欠钱到期还不上+明显没钱还（连工资都发不出）\n③虽然现在还能撑，但"明显要不行了"（可申请重整）',
            detail:'①不能清偿+资不抵债。②不能清偿+明显缺乏清偿能力。③明显丧失清偿能力可能（重整申请）。' },
          { kw:'破产清偿顺序 = "破产了钱先给谁"', tag:'必考',
            life:'公司破产了，清算出来的钱怎么分？就像分粥：\n第一碗：破产费用（打官司的花费+清算人的工资）\n第二碗：欠员工的工资+社保+补偿金\n第三碗：欠国家的税款\n第四碗：其他普通债主\n有抵押的债主：不参与排队，直接拿抵押物变现。',
            detail:'①破产费用+共益债务。②职工工资+社保+补偿金。③税款。④普通债权。担保物权人别除权优先。' },
          { kw:'破产撤销权 = "破产前偷偷转移财产"可撤销', tag:'重点',
            life:'老王知道公司要破产了，偷偷把公司的车低价卖给他弟弟。法律说：这笔交易可以撤销！车的钱要追回来分给债主。\n可撤销的期限：破产受理前1年内干的这些事（低价转让/提前还债等）。\n破产受理前6个月内还了个别债主→也可撤销。',
            detail:'受理前1年：无偿转让/低价/无担保加担保/提前清偿。受理前6个月：个别清偿（使财产受损）→可撤销。' },
          { kw:'重整 vs 和解', tag:'对比',
            life:'两者都是"破产的挽救措施"：\n• 重整=公司还有救！重新调整股权+债务。可以削股东的权利（减少股份）、延期还债。管用但对股东影响大。\n• 和解=只谈债务怎么还（分期还/打折还），不涉及股权。只有债务人（公司）能申请。\n简单记：重整=大手术（股东也得让路）；和解=小调理（只处理债务）。',
            detail:'重整：债务人或债权人+出资额≥10%可申请，可调整股权，约束所有债权人。和解：仅债务人可申请，仅调整债务。' },
        ]},
      { name:'第9章 票据与支付结算', icon:'💳',
        points:[
          { kw:'票据的种类与特征', tag:'基础',
            life:'三种票据像三种"钱的替代品"：\n① 汇票=你写个条子说"三个月后给张三1000块"（可延期）\n② 本票=银行开的"见票就给钱"的承诺书\n③ 支票=你现在写个条子让银行马上给钱（不能延期，10天内有效）\n特征：见票认字不认人（文义性）、拿到了就有效（无因性）',
            detail:'汇票（银行+商业）、本票（银行）、支票（普通+现金+转账）。特征：文义性、无因性、要式性、流通性。' },
          { kw:'票据抗辩限制 = "不能因为前手有问题就不给钱"', tag:'高频',
            life:'老王开了一张汇票给老张，老张转给了你。现在到期了，你找老王要钱。老王说"老张骗了我，所以我不给你钱"→法律说：不行！你得给钱，你和老张之间的事另外算。\n除非你明知老王和老张有纠纷（你恶意），否则老王必须给你钱。',
            detail:'票据债务人不得以与出票人/前手的抗辩事由对抗持票人（持票人明知除外）。保护票据流通性。' },
          { kw:'支票的特别规定', tag:'实用',
            life:'用支票要注意3件事：\n①金额可以空着先给别人（授权补记）\n②拿到支票后10天内必须去银行取钱（过期了银行可以不付）\n③账户里必须有钱！开空头支票违法→罚款+信用记录受损',
            detail:'①不含收款人名称。②金额可补记。③提示付款期限10日（超期付款人可不付但出票人仍担责）。④禁止空头支票。' },
          { kw:'票据伪造 vs 变造', tag:'易混',
            life:'• 伪造=假签名（你冒充老王在票据上签字。老王不负责，你负刑事责任）\n• 变造=改金额（把100元改成10000元。在改之前签的名按原金额，改之后签名的按新金额）\n简单记：伪造=人不对；变造=数字不对。',
            detail:'伪造：签章伪造（被伪造人不担责，伪造人承担刑/民事）。变造：更改签章以外内容（签章前→原内容；之后→变造内容）。' },
        ]},
      { name:'第10章 企业国有资产法律制度', icon:'🏛️',
        points:[
          { kw:'国家出资企业的四种类型', tag:'基础',
            life:'国家当老板的4种方式：\n①国有独资企业=国家100%持有（老国企模式）\n②国有独资公司=国家100%持有（现代公司模式）\n③国有资本控股公司=国家持股>50%（国家说了算）\n④国有资本参股公司=国家持股<50%（国家只参与不分红）',
            detail:'国有独资企业+国有独资公司+国有资本控股公司+国有资本参股公司。' },
          { kw:'关联方交易的"高压线"', tag:'重点',
            life:'公司高管的小舅子想和公司做生意→这就是关联交易。\n红线（绝对禁止）：国有独资企业/公司不能无偿给关联方资产、不能以不公平价格交易、不能和关联方一起投资。\n其他关联交易：要有正当程序（董事会/股东会批准、公平价格）。',
            detail:'关联方：董监高+近亲属+其控制的企业。国有独资禁止无偿/不公平/共同出资。其他须履行决策程序。' },
          { kw:'企业产权转让 = "卖国企股份的流程"', tag:'流程',
            life:'国家想卖掉手里某国企的股份，必须走正规流程：\n①必须在产权交易所公开挂牌（不能私下找买家）\n②提前挂出来公示≥20个工作日\n③正式挂牌≥20个工作日\n④底价不能低于评估价\n⑤如果要降价超过10%→必须重新批准',
            detail:'①公开进场交易。②预披露≥20工作日。③正式披露≥20工作日。④首次底价≥评估价。⑤降价≥10%须重新批准。' },
        ]},
      { name:'第11章 反垄断法律制度', icon:'🚫',
        points:[
          { kw:'垄断协议 = "串通定价"', tag:'核心',
            life:'• 横向垄断协议=几家同行串通：他们说好一起涨价/一起减产/互相不抢客户。就像几家奶茶店说好"大家都卖25元/杯"\n• 纵向垄断协议=上游给下游定死价格：厂家说"你卖我的东西最低不能低于100元"',
            detail:'横向（竞争者间）：固定价格+限产+分割市场+限制技术+联合抵制。纵向（上下游）：固定转售价+限定最低转售价。' },
          { kw:'滥用市场支配地位 = "店大欺客"', tag:'必考',
            life:'一家独大的公司欺负人：\n• 不公平高价（独家药卖天价）\n• 低于成本卖（挤死小商家再涨价）\n• 拒绝交易（不给你供货）\n• 搭售（想买热门商品必须搭配卖不出去的）\n• 差别待遇（对不同的客户给不同价格）',
            detail:'不公平高价/低价+低于成本倾销+拒绝交易+限定交易+搭售+差别待遇。市场份额的认定：单方≥50%。' },
          { kw:'经营者集中 = "合并需要申报"', tag:'重点',
            life:'两家大公司要合并，如果营业额太大→必须向反垄断局申报。\n标准：全球合计营收>100亿+至少2家在中国营收>4亿；或中国合计营收>20亿+至少2家在中国营收>4亿。\n审查结果：批准/有条件批准/禁止。',
            detail:'全球合计>100亿+至少2方中国>4亿。或中国合计>20亿+至少2方中国>4亿。审查30+90(+延长至150)日。' },
          { kw:'行政垄断 = "政府搞地方保护"', tag:'特色',
            life:'某市政府发文件说"全市机关单位只能买本地生产的办公用品"→这就是行政垄断。\n表现形式：\n• 指定只能买某家的\n• 不让外地商品进来\n• 不让外地企业投标\n• 强制企业搞垄断',
            detail:'指定购买+限制外地商品+限制投标+强制垄断+制定排除竞争规定。反垄断法禁止行政机关滥用行政权力。' },
        ]},
      { name:'第12章 涉外经济法律制度', icon:'🌐',
        points:[
          { kw:'外商投资准入 = "负面清单管理"', tag:'核心',
            life:'外国人来中国投资就像进一个俱乐部：\n• 负面清单=俱乐部里写了"这几间房不能进"（禁止投资行业）+ "这几间房要有会员才能进"（限制投资行业）\n• 清单以外的→外国人和中国人一样待遇（准入前国民待遇）\n• 还有国家安全审查（太敏感的不让进）',
            detail:'准入前国民待遇+负面清单管理。清单以外内外资一致。安全审查制度。' },
          { kw:'反倾销 = "外国货卖太便宜"', tag:'实用',
            life:'某国把钢材以低于成本价卖到中国，中国的钢厂活不下去了。中国政府可以：\n①调查是否真的倾销（出口价<正常价值）\n②查是否对中国产业造成损害\n③成立→征收反倾销税（最高5年）',
            detail:'倾销：出口价<正常价值。损害：实质损害/威胁/阻碍。反倾销税≤5年。价格承诺可替代。' },
          { kw:'保障措施 = "进口突然暴增"', tag:'对比',
            life:'和反倾销不同：\n保障措施不是针对某个国家搞鬼，而是"所有国家突然都往中国卖这个东西，国内企业受不了"。\n可以：提高关税+数量限制（针对所有国家，不分哪个国家）。\n临时保障措施≤200天。',
            detail:'进口数量增加（绝对+相对）+严重损害+针对所有来源国（非歧视）。形式：提高关税+数量限制。' },
        ]}
    ]},
  zl: {
    name:'战略', icon:'🎯', color:'#e17055',
    chapters:[
      { name:'第1章 战略与战略管理概述', icon:'🗺️',
        points:[
          { kw:'公司战略 = "开公司的导航地图"', tag:'理解',
            life:'就像你从北京开车去上海：需要先定目的地（愿景）、选走哪条高速（战略）、下哪个出口（策略）。\n战略解决三个问题：①去哪儿（目标）。②怎么去（路径）。③带什么去（资源）。',
            detail:'公司战略是企业在竞争环境中为获得长期生存和发展而进行的总体性、长远性、基本性的谋划。包括战略目标+路径选择+资源配置。' },
          { kw:'使命·愿景·目标 = "灵魂三问"', tag:'基础',
            life:'• 使命=为什么开这家店（"让中国人喝上好咖啡"）\n• 愿景=想做成什么样（"成为亚洲第一的咖啡品牌"）\n• 战略目标=具体数字（"3年内开500家店，营收10亿" SMART原则）\n使命是初心，愿景是梦想，目标是KPI。',
            detail:'使命（存在目的）→愿景（想成为什么）→战略目标（SMART：具体+可衡量+可达成+相关+有时限）。' },
          { kw:'战略变革 = "公司转型"', tag:'理解',
            life:'就像诺基亚从造纸→做手机→做电信设备，每次都是大转型。\n变革管理三步骤：\n①解冻=让大家意识到"不变不行了"（老路堵死了）\n②变革=开始行动（学新东西）\n③再冻结=新方法变成习惯',
            detail:'①解冻（打破现状）。②变革（推动实施）。③再冻结（巩固新状态）。克服阻力：沟通+参与+支持+谈判+操纵+强制。' },
          { kw:'战略的三个层次', tag:'框架',
            life:'就像一个军队：\n• 公司层=总司令（决定打不打仗、去哪里打）\n• 业务层=前线将军（决定怎么打、用什么战术）\n• 职能层=后勤部门（搞补给、招兵、管钱）\n上层给方向，下层定方法。',
            detail:'公司层战略（总体战略）→业务层战略（竞争战略）→职能层战略（研发/生产/营销/人力/财务）。' },
        ]},
      { name:'第2章 战略分析', icon:'🔍',
        points:[
          { kw:'PEST分析 = "看大环境"', tag:'工具',
            life:'你想在学校门口开奶茶店，先观察四个方面：\nP（政治环境）：学校允许摆摊吗？城管管得严吗？\nE（经济环境）：学生零花钱多吗？附近有商圈吗？\nS（社会环境）：学生喜欢喝奶茶吗？流行趋势？\nT（技术环境）：怎么点单？用小程序吗？',
            detail:'P（政治法律）+E（经济）+S（社会文化）+T（技术）。分析宏观环境对企业的影响。' },
          { kw:'波特五力 = "奶茶店竞争分析"', tag:'必考',
            life:'你在学校门口开奶茶店的5个竞争力量：\n① 新开的奶茶店（潜在进入者）：门槛低，明天就可能又开一家\n② 旁边卖果汁的（替代品）：不喝奶茶可以喝果汁\n③ 奶精供应商（供应商议价）：如果只有一家供货，你被拿捏\n④ 学生砍价（买方议价）：隔壁便宜2块你就没生意\n⑤ 对面那家奶茶店（现有竞争）：天天打价格战',
            detail:'①潜在进入者（规模经济+转换成本+资金+渠道+政策）。②替代品（性价比+转换成本）。③供应商（集中度+替代性+重要性）。④买方。⑤现有竞争者（增长+集中度+差异化+退出壁垒）。' },
          { kw:'SWOT分析 = "对自己做体检"', tag:'必考',
            life:'就像你要追一个人，先分析自己：\nS（优势）= 你幽默、会照顾人\nW（劣势）= 你工资不高\nO（机会）= 对方刚失恋需要安慰\nT（威胁）= 情敌很有钱\n\n策略：\nSO→利用优势抓住机会（幽默安慰她）\nWO→补短板抓机会（先找个好工作）\nST→用优势应对威胁（用幽默打败情敌的金钱）\nWT→防守（先提升自己）',
            detail:'S（优势）+W（劣势）=内部。O（机会）+T（威胁）=外部。SO增长↔WO扭转↔ST多种经营↔WT防御。' },

    { q:'根据民法典，下列关于诉讼时效的表述中，正确的是？', opts:['A. 诉讼时效期间届满后，债务人可以主张诉讼时效抗辩','B. 诉讼时效中断的事由消除后，诉讼时效期间重新计算6个月','C. 支付存款本金及利息请求权适用诉讼时效','D. 无民事行为能力人对其法定代理人的请求权的诉讼时效，自知道权利受损之日起计算'], ans:0, explain:'A正确：时效届满后，债务人取得抗辩权，可以主张不履行债务。B错误：中断后重新计算（不是6个月）。C错误：支付存款本息不适用诉讼时效。D错误：无民事行为能力人对法定代理人的请求权，自法定代理终止之日起计算。', life:'诉讼时效就像超市的"7天退换货"政策——过了7天，商家可以说"我不给退了"。但存银行的钱（存款本息）永远可以要回来，不适用这个规则。' },
    { q:'根据物权法律制度，下列属于动产所有权善意取得构成要件的有？', opts:['A. 受让人受让该动产时是善意的','B. 以合理的价格转让','C. 转让的动产已经交付给受让人','D. 转让人对转让的动产享有所有权'], ans:'ABC', explain:'D错误：善意取得的前提恰恰是转让人无处分权（即不享有所有权）。ABC是善意取得的三个核心要件：善意+合理价格+交付。如果转让人有所有权，那就是正常的买卖，不需要善意取得制度。', life:'就像你室友偷了别人的电脑拿去卖给你，你不知情（善意）、花了正常价（合理价格）、拿到了电脑（交付）→法律保护你，电脑归你。但室友如果本来就是电脑主人，那就正常买卖，不需要"善意取得"来保护。' },
    { q:'甲将房屋抵押给乙，办理了抵押登记。后甲将该房屋出租给丙，租期3年。关于该抵押权的实现，下列表述中正确的是？', opts:['A. 抵押权实现后，租赁合同对受让人继续有效','B. 抵押权实现后，租赁合同对受让人不具有约束力','C. 乙的抵押权效力不及于该房屋的租金','D. 甲将房屋出租须经乙同意'], ans:0, explain:'A正确：先抵押后出租且已登记的，租赁合同对受让人有约束力（"抵押不破租赁"）。B错误：若先租后抵，租赁更优先；先抵后租，已登记的也不破租赁。C错误：抵押权效力及于租金（物上代位性）。D错误：抵押人不需要抵押权人同意即可出租。', life:'就像你先把房子抵押给银行借钱，然后又租给别人住。银行收房子的时候，租客可以继续住到租期结束（"抵押不破租赁"）。这就是为啥买房前要查清楚有没有租客，否则买到也住不进去。' },
    { q:'根据合同法律制度，下列关于定金的表述中正确的有？', opts:['A. 定金合同自实际交付定金时成立','B. 定金的数额不得超过主合同标的额的20%','C. 给付定金的一方不履行债务，无权请求返还定金','D. 实际交付的定金数额多于约定数额的，视为变更约定的定金数额'], ans:'ABCD', explain:'四个选项都对。A：定金合同是实践合同（交了才成立）。B：≤20%，超部分无效（不产生定金效力）。C：给付方违约→无权收回。D：实际多交了按实际算。注意：收受方违约要双倍返还。', life:'你看中一件500元的衣服，给了老板100元定金：①如果你反悔→100元不退。②老板反悔→退你200元。③定金最多不能超过100元（500×20%）。④如果你给了120元→也按120元算定金。' },
    { q:'根据合伙企业法律制度，下列关于有限合伙企业的表述中正确的是？', opts:['A. 有限合伙企业由普通合伙人和有限合伙人组成','B. 有限合伙人可以劳务出资','C. 有限合伙人可以执行合伙事务','D. 有限合伙人不得自营或者同他人合作经营与本有限合伙企业相竞争的业务'], ans:0, explain:'A正确：有限合伙=至少1个普通合伙人+至少1个有限合伙人。B错误：有限合伙人不能以劳务出资（普通合伙人可以）。C错误：有限合伙人不得执行合伙事务。D错误：有限合伙人可以经营竞争业务（不受竞业禁止限制）。', life:'有限合伙人就像"只出钱不说话"的投资人：可以干自己的生意（包括跟公司竞争），但不能插手公司管理。只有普通合伙人才能用"技术、人脉"（劳务）来当出资。' },
    { q:'根据公司法律制度，下列人员中，不得担任公司董事、监事、高级管理人员的有？', opts:['A. 因贪污被判刑，执行期满未逾5年','B. 担任破产清算公司的董事且负有个人责任，自该公司破产清算完结之日起未逾3年','C. 个人所负数额较大的债务到期未清偿','D. 限制民事行为能力人'], ans:'ABCD', explain:'四个选项都是法定的禁止情形。A：刑罚执行期满未逾5年（经济犯罪）。B：破产清算完结未逾3年且负个人责任。C：大额债务到期未清偿（个人征信差）。D：限制民事行为能力或无民事行为能力人不得担任。', life:'开公司的"高管"不是谁都能当的：①坐过牢的（经济犯罪）要等5年。②把公司干破产的责任人要等3年。③欠一屁股债不还的不行。④没长大（限制民事行为能力）的不行。' },
    { q:'根据证券法律制度，下列属于内幕信息的有？', opts:['A. 公司分配股利或者增资的计划','B. 公司股权结构的重大变化','C. 公司债务担保的重大变更','D. 公司营业用主要资产的抵押、出售或者报废一次超过该资产的30%'], ans:'ABCD', explain:'四个选项都是法定的内幕信息。内幕信息=对上市公司股票交易价格可能有较大影响的、尚未公开的信息。还包括：公司重大投资行为、订立重要合同、经营方针重大变化、董事长/总经理变动等。', life:'你在上市公司当秘书，知道公司马上要分红了（还没公告），赶紧买股票→内幕交易！知道机密的时候别炒股，等公告了再说。' },
    { q:'根据企业破产法律制度，下列各项中属于破产费用的有？', opts:['A. 破产案件的诉讼费用','B. 管理、变价和分配债务人财产的费用','C. 管理人执行职务的费用、报酬','D. 为债务人继续营业而应支付的劳动报酬'], ans:'ABC', explain:'ABC是破产费用（为了破产程序的运转花的钱）。D是共益债务（为了让公司继续运转花的钱）。两者在清偿顺序上破产费用优先于共益债务。区别：破产费用=处理破产这件事本身的花费；共益债务=破产期间继续经营的花费。', life:'破产费用就像"办丧事"的花费（诉讼费、清算人的工资等）。共益债务就像"病人在抢救期间"的花费（继续营业的工资、水电费等）。办丧事的钱要先出，再出抢救的钱。' },
    { q:'甲公司将一张银行承兑汇票背书转让给乙公司，乙公司又背书转让给丙公司。丙公司向银行提示付款时，银行以甲公司欠其货款为由拒绝付款。根据票据法律制度，下列关于丙公司行使票据权利的表述中正确的是？', opts:['A. 丙公司只能向甲公司行使追索权','B. 丙公司可以向乙公司行使追索权','C. 丙公司可以向银行行使追索权','D. 丙公司可以向甲、乙、银行中的任意一方行使追索权'], ans:3, explain:'D正确：持票人丙可以向出票人（甲）、前手（乙）、承兑人（银行）中的任意一方行使追索权。票据追索权具有选择性（可任选追索对象）、变更性（可换人追索）、代位性（追到后可继续向前手追）。银行作为承兑人是主债务人，不能以与出票人之间的抗辩事由对抗持票人。', life:'就像你拿到了一张借条，谁在上面签了字你都可以找他要钱。银行既然承兑了（承诺付款），就不能说"因为甲公司欠我钱所以不给你"，银行和甲公司的纠纷跟拿票据的丙没关系。' },
    { q:'根据反垄断法律制度，下列属于横向垄断协议的有？', opts:['A. 固定或者变更商品价格','B. 限制商品的生产数量或者销售数量','C. 分割销售市场或者原材料采购市场','D. 联合抵制交易'], ans:'ABCD', explain:'横向垄断协议=同行之间串通。ABCD都是典型的横向垄断形式。此外还包括：限制购买新技术/新设备、限制开发新技术/新产品。纵向垄断协议（上下游之间）主要是固定转售价格和限定最低转售价格。', life:'几家奶茶店老板坐在一起说好"大家都卖25元/杯"→横向垄断！或者"你卖东边，我卖西边，不抢对方客户"→也是横向垄断！同行之间不能串通，各凭本事竞争。' },
    { q:'根据涉外经济法律制度，下列关于外商投资管理的表述中正确的是？', opts:['A. 外商投资实行准入前国民待遇加负面清单管理制度','B. 负面清单以外的领域，按照内外资一致的原则实施管理','C. 外国投资者不得投资负面清单禁止投资的领域','D. 外商投资安全审查制度属于准入后管理措施'], ans:'ABC', explain:'ABC正确。D错误：安全审查制度属于准入前管理措施（不是准入后），是在投资进入前就要审查的。负面清单分为禁止类和限制类，禁止类不能投，限制类要符合条件才能投。', life:'外国人来中国投资就像进一个"会员制俱乐部"：门口贴了张纸（负面清单），上面写的"这几间房不能进"（禁止投资）、"这几间要有会员卡才能进"（限制投资）。其他的房间随便进，跟中国人一样待遇。' },
  ],
  zl: [
    { q:'下列各项中，属于PEST分析中政治法律环境因素的有？', opts:['A. 国家的产业政策','B. 税收政策','C. 环境保护立法','D. 贸易政策'], ans:'ABCD', explain:'PEST的P（Political）包括：政治制度、方针政策（产业政策、税收政策、贸易政策）、法律法规（环保法、劳动法等）、政府行为等。四个选项都属于政治法律环境因素。', life:'你想在学校门口开奶茶店，P=看学校让不让摆摊、城管管不管、有没有食品安全规定。这些都是"政治法律环境"，不是你说了算的，得先了解清楚。' },
    { q:'根据波特五力模型，下列各项中，影响行业进入壁垒的因素有？', opts:['A. 规模经济','B. 转换成本','C. 产品差异化','D. 政府政策'], ans:'ABCD', explain:'进入壁垒=新人想进来有多难。ABCD四个都是提高进入壁垒的因素。此外还有：资本需求、与规模无关的成本劣势（如专利技术、地理优势、学习曲线）、分销渠道、预期报复等。', life:'你在小区门口开了家奶茶店，别人想跟风开店：如果开奶茶店要投100万（资本需求高）、要有独家配方（产品差异化）、要办食品许可证（政府政策）→别人就不容易进来，你的生意就好做。' },
    { q:'甲公司是国内一家大型家电企业，在冰箱、空调、洗衣机等产品的市场份额均位居行业前列。近年来，该公司开始涉足智能手机、智能家居等新领域。根据波士顿矩阵，下列表述中正确的有？', opts:['A. 冰箱业务属于现金牛业务','B. 智能手机业务属于明星业务','C. 智能家居业务属于问题业务','D. 洗衣机业务属于瘦狗业务'], ans:'AC', explain:'A正确：冰箱市场成熟（低增长）+甲份额高→现金牛（提供现金流）。C正确：智能家居是新领域（高增长）+甲刚进入（低份额→问题业务），需要大量资金投入但前途未卜。B错误：智能手机是否明星要看数据，题干未说明。D错误：洗衣机同冰箱一样，很可能是现金牛而非瘦狗。', life:'就像你养了四个"孩子"：冰箱业务=学霸但低调（现金牛，稳定赚钱）。智能手机=如果做得好是学霸受宠（明星），做得不好就是偏科生（问题）。智能家居=偏科生（问题业务），要不要继续培养得想清楚。' },
    { q:'根据SWOT分析原理，下列适合采用增长型战略（SO战略）的情况是？', opts:['A. 企业外部有机会，内部有优势','B. 企业外部有机会，内部有劣势','C. 企业外部有威胁，内部有优势','D. 企业外部有威胁，内部有劣势'], ans:0, explain:'SO=Strengths+Opportunities，用优势去抓住机会，适合增长型战略。WO=利用机会、弥补劣势（扭转战略）。ST=用优势应对威胁（多种经营战略）。WT=减少劣势、回避威胁（防御战略）。', life:'你擅长做饭（优势）+ 学校门口刚好缺一家好吃的餐馆（机会）→赶紧开一家！这就是SO增长战略。如果你不会做饭（劣势）+ 大家需要餐馆（机会）→先去学厨艺（WO扭转战略）。' },
    { q:'下列各项中，属于成本领先战略的实施条件（资源和能力）的有？', opts:['A. 实现规模经济','B. 降低各种要素成本','C. 提高生产率','D. 改进产品工艺设计'], ans:'ABCD', explain:'成本领先战略的资源和能力包括：①规模经济降低单位成本。②要素成本控制（原料、人工等）。③提高生产率（流程优化、自动化）。④改进产品设计（简化功能、减少用料）。⑤利用学习曲线效应。⑥与供应商建立良好关系。⑦纵向整合。', life:'你想做"最便宜的奶茶"（成本领先）：①一次买很多杯子（规模经济）→每个杯子的单价更便宜。②用性价比更高的原料（降低要素成本）。③优化流程，一个人能同时做4杯（提高生产率）。④简化包装不用花里胡哨的（改进设计）。' },
    { q:'根据战略钟模型，下列各项中属于失败战略的是？', opts:['A. 低价低值','B. 低价','C. 高值','D. 高价低值'], ans:3, explain:'战略钟有8种定位：①低价低值（集中成本领先）。②低价（成本领先）。③混合（物美价廉）。④高值（差异化）。⑤高价高值（集中差异化）。⑥高价标准值（失败）。⑦低价标准值（失败）。⑧高价低值（失败）。D选项高价低值=贵且质量差，肯定失败。', life:'一家饭店的菜又贵又难吃（高价低值）→肯定没人来，倒闭。一家饭店菜便宜但很难吃（低价低值）→适合学生但长久也不行。最理想的是"物美价廉"（混合战略），或者"东西确实好、贵点也值得"（高值差异化）。' },
    { q:'下列关于平衡计分卡四个维度的表述中正确的有？', opts:['A. 财务维度包括营业收入、投资回报率等指标','B. 客户维度包括客户满意度、市场份额等指标','C. 内部流程维度可以反映企业的创新能力','D. 学习与成长维度包括员工满意度、信息系统能力等指标'], ans:'ABCD', explain:'四个维度及典型指标：\n财务：ROI、营收、利润、现金流、成本降低\n客户：满意度、留存率、市场份额、获客率\n内部流程：质量（次品率）、效率（周转率）、创新（研发周期）、售后\n学习成长：员工技能/满意度、信息系统、组织文化', life:'评价一个公司好不好，不能只看赚了多少钱。就像评价一辆车：不能只看速度（财务），还要看安全（客户满意度）、油耗（效率）、坐着舒服不舒服（员工满意度）。' },
    { q:'根据公司治理理论，下列属于第一类代理问题（股东与管理层之间的代理问题）表现形式的有？', opts:['A. 经理人过度在职消费','B. 经理人盲目扩张企业规模','C. 经理人偷懒懈怠','D. 大股东通过关联交易侵占公司利益'], ans:'ABC', explain:'ABC是第一类代理问题（管理层损害股东利益）。D是第二类代理问题（大股东损害小股东利益）。第一类代理问题的核心：管理层拿着股东的"钱"但不把股东的钱当自己的钱，表现为奢侈消费、过度投资建"帝国"、偷懒等。', life:'你是饭店老板（股东），请了个店长（经理）来管店。店长：①天天请朋友来免费吃饭（过度在职消费）。②非要开分店但其实不需要（盲目扩张）。③天天摸鱼玩手机（偷懒）。→这些都是第一类代理问题。如果大股东把饭店的钱借给自己亲戚（第二类），那是欺负小股东。' },

var USER = localStorage.getItem('cpa_user')||'';
function up(k){return USER ? 'cpa_'+USER+'_'+k : 'cpa_'+k}

const S = {
  sub: 'jjf',
  memo: {}, star: {}, weak: {},
  dark: false,
  page: 'main',
  fq: [], fi: 0
};

function loadUserData(){
  if(!USER) return;
  S.memo = JSON.parse(localStorage.getItem(up('memo'))||'{}');
  S.star = JSON.parse(localStorage.getItem(up('star'))||'{}');
  S.weak = JSON.parse(localStorage.getItem(up('weak'))||'{}');
  S.dark = localStorage.getItem(up('dark'))==='true';
}

function save(){
  if(!USER) return;
  localStorage.setItem(up('memo'),JSON.stringify(S.memo));
  localStorage.setItem(up('star'),JSON.stringify(S.star));
  localStorage.setItem(up('weak'),JSON.stringify(S.weak));
  localStorage.setItem(up('dark'),S.dark);
}
function k(s,ci,pi){return s+'-'+ci+'-'+pi}
function allPts(s){
  let r=[];
  (s==='mixed'?['jjf','zl']:[s]).forEach(sub=>{
    DATA[sub].chapters.forEach((ch,ci)=>{
      ch.points.forEach((p,pi)=>r.push({...p,sub,ci,pi,key:k(sub,ci,pi),chName:ch.name,subName:DATA[sub].name}));
    });
  });
  return r;
}
function count(sub){let p=allPts(sub);return{p:Object.keys(S.memo).filter(x=>S.memo[x]&&x.startsWith(sub)).length,t:p.length}}

function render(){
  if(USER) document.getElementById('userBtn').textContent='👤'+USER;
  const sub=S.sub;
  const wrap=document.getElementById('mainWrap');
  let html='';
  const pts=allPts(sub);
  const memCount=pts.filter(p=>S.memo[p.key]).length;
  document.getElementById('statRow').innerHTML=
    `<span>📝 ${pts.length} 考点</span><span>✅ 已掌握 ${memCount}/${pts.length}</span><span>⭐ ${pts.filter(p=>S.star[p.key]).length} 收藏</span>`;

  const subjects=sub==='mixed'?['jjf','zl']:[sub];
  subjects.forEach(s=>{
    const d=DATA[s];
    d.chapters.forEach((ch,ci)=>{
      let mc=0,st=0,wk=0;
      ch.points.forEach((_,pi)=>{
        const kk=k(s,ci,pi);
        if(S.memo[kk])mc++;
        if(S.star[kk])st++;
        if(S.weak[kk])wk++;
      });
      const total=ch.points.length;
      const pct=total?Math.round(mc/total*100):0;
      const colors=['#6c5ce7','#e17055','#0984e3','#00b894','#fdcb6e','#fd79a8'];
      const ci2=subjects.indexOf(s)*d.chapters.length+ci;
      html+=`<div class="mind">
        <div class="mind-hd" onclick="togMind(this)">
          <div class="ico" style="background:${colors[ci2%6]}22">${ch.icon||'📌'}</div>
          <div class="info">
            <div class="nm">${ch.name}</div>
            <div class="sub">${s==='jjf'?'📜经济法':'🎯战略'} · ✅${mc}/${total} ⭐${st} 🔴${wk}</div>
          </div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div>
          <div class="arr">▼</div>
        </div>
        <div class="mind-bd">`;

      ch.points.forEach((p,pi)=>{
        const kk=k(s,ci,pi);
        const memo=S.memo[kk],star=S.star[kk],weak=S.weak[kk];
        html+=`<div class="knot${memo?' memo':''}${star?' starred':''}${weak?' weak':''}" onclick="toggleKnot(this)">
          <div class="kw">${p.kw} <span class="tag">${p.tag||''}</span></div>
          <div class="life"><div class="lb">💡 生活化理解</div>${(p.life||'').replace(/\n/g,'<br>')}</div>
          <div class="detail">${(p.detail||'').replace(/\n/g,'<br>')}</div>
          <div class="foot">
            <span class="btn mem${memo?' on':''}" onclick="evStop(event);tog('memo','${kk}',this)">${memo?'✅已会':'○标记'}</span>
            <span class="btn star${star?' on':''}" onclick="evStop(event);tog('star','${kk}',this)">${star?'⭐':'☆收藏'}</span>
            <span class="btn weak${weak?' on':''}" onclick="evStop(event);tog('weak','${kk}',this)">${weak?'🔴弱':'○弱'}</span>
          </div>
        </div>`;
      });

      html+=`</div></div>`;
    });
  });

  wrap.innerHTML=html;
  const c=count('jjf');document.getElementById('jjfCt').textContent=c.p+'/'+c.t;
  const c2=count('zl');document.getElementById('zlCt').textContent=c2.p+'/'+c2.t;
}

function togMind(el){
  const bd=el.nextElementSibling;
  bd.classList.toggle('open');
  el.querySelector('.arr').classList.toggle('open');
}
function toggleKnot(el){
  const life=el.querySelector('.life');
  const detail=el.querySelector('.detail');
  life.classList.toggle('show');
  detail.classList.toggle('show');
}
function evStop(e){e.stopPropagation()}

function tog(what,key,el){
  if(what==='memo')S.memo[key]=!S.memo[key];
  else if(what==='star')S.star[key]=!S.star[key];
  else if(what==='weak')S.weak[key]=!S.weak[key];
  save();
  const kk=el.closest('.knot');
  if(what==='memo'){kk.classList.toggle('memo');el.textContent=S.memo[key]?'✅已会':'○标记';el.classList.toggle('on')}
  else if(what==='star'){kk.classList.toggle('starred');el.textContent=S.star[key]?'⭐':'☆收藏';el.classList.toggle('on')}
  else if(what==='weak'){kk.classList.toggle('weak');el.textContent=S.weak[key]?'🔴弱':'○弱';el.classList.toggle('on')}
  render();
  document.querySelectorAll('.sub-bar div').forEach(d=>d.classList.remove('active'));
  const st=S.sub==='mixed'?'mixed':S.sub;
  document.querySelector(`.sub-bar div[data-s="${st}"]`).classList.add('active');
}

document.querySelectorAll('.sub-bar div').forEach(el=>{

// search
document.getElementById('searchInp').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  document.querySelectorAll('.mind').forEach(m=>{
    let f=false;
    m.querySelectorAll('.knot').forEach(k=>{
      const t=k.textContent.toLowerCase();
      if(!q||t.includes(q)){k.style.display='block';f=true}
      else k.style.display='none';

});

// flashcard
function fcStart(){
  S.fi=0;
  let pts=allPts(S.sub);
  if(S.sub==='mixed') pts=pts.sort(()=>Math.random()-0.5);
  else pts=pts.sort(()=>Math.random()-0.5);
  if(!pts.length){alert('没有考点');return}
  S.fq=pts;
  document.getElementById('fcOverlay').classList.add('show');
  fcShow();
}
function fcShow(){
  if(S.fi>=S.fq.length){
    document.getElementById('fcQ').innerHTML='🎉 全部搞定！<div style="font-size:14px;color:var(--text2);margin-top:8px">太棒了，你已经完成一轮复习 👏</div>';
    document.getElementById('fcLife').classList.remove('show');
    document.getElementById('fcA').classList.remove('show');
    document.getElementById('fcActs').innerHTML='<button class="fc-done" onclick="fcClose()" style="flex:1">返回</button>';
    document.getElementById('fcBar').textContent=`完成 ${S.fq.length}/${S.fq.length}`;
    return;
  }
  const p=S.fq[S.fi];
  document.getElementById('fcHead').textContent=p.subName;
  document.getElementById('fcCh').textContent=p.chName;
  document.getElementById('fcQ').innerHTML=`${p.kw}<div class="hint">👆 点我展开</div>`;
  document.getElementById('fcLife').innerHTML=`<div class="lb">💡 生活化理解</div>${(p.life||'').replace(/\n/g,'<br>')}`;
  document.getElementById('fcLife').classList.remove('show');
  document.getElementById('fcA').innerHTML=(p.detail||'').replace(/\n/g,'<br>');
  document.getElementById('fcA').classList.remove('show');
  document.getElementById('fcBar').textContent=`第 ${S.fi+1}/${S.fq.length} 题`;
  document.getElementById('fcActs').innerHTML=`
    <button class="fc-dunno" onclick="fcAct('dunno')">❌ 不会</button>
    <button class="fc-know" onclick="fcAct('know')">✅ 已会</button>
    <button class="fc-next" onclick="fcNext()">⏭ 下一题</button>`;
  document.getElementById('fcQ').onclick=function(){
    document.getElementById('fcLife').classList.add('show');
    document.getElementById('fcA').classList.add('show');
    this.querySelector('.hint')&&(this.querySelector('.hint').textContent='');
  };
}
function fcAct(a){
  const p=S.fq[S.fi];
  if(!p)return;
  if(a==='know')S.memo[p.key]=true;
  else{S.memo[p.key]=false;S.weak[p.key]=true}
  save();
  fcNext();
}
function fcNext(){S.fi++;fcShow()}
function fcClose(){document.getElementById('fcOverlay').classList.remove('show');render()}

// dark mode
function toggleDark(){S.dark=!S.dark;document.body.classList.toggle('dark',S.dark);document.getElementById('darkBtn').textContent=S.dark?'☀️':'🌙';save()}

  // show existing users
  const users=[];

function switchToUser(name){
  if(!name.trim()) return;
  if(name===USER){document.getElementById('loginOverlay').classList.add('hidden');return}
  localStorage.setItem('cpa_user',name);
  USER=name;
  loadUserData();
  loadExam();
  document.getElementById('loginOverlay').classList.remove('show');
  document.getElementById('userBtn').textContent='👤'+USER;
  document.getElementById('darkBtn').textContent=S.dark?'☀️':'🌙';
  if(S.dark) document.body.classList.add('dark'); else document.body.classList.remove('dark');
  render();
}

function deleteUser(name){
  if(!confirm('确定删除「'+name+'」的所有学习记录？'))return;
  Object.keys(localStorage).filter(k=>k.startsWith('cpa_'+name)).forEach(k=>localStorage.removeItem(k));
  showLogin();
}

function showExamPage(){
  document.querySelectorAll('.scroll-wrap,.spec,.exam-wrap,.mash-wrap,.fw-wrap').forEach(e=>e.classList.remove('show'));
  document.querySelector('.sub-bar').style.display='flex';

  let html=`
    <div class="exam-hd">📝 历年真题演练
      <span class="esub">点击选项看解析</span>
    </div>
    <div class="exam-info" style="display:flex;gap:8px;flex-wrap:wrap">
      <span style="background:var(--card);padding:3px 10px;border-radius:12px" onclick="examFilter('all')">📋 全部</span>
      <span style="background:var(--card);padding:3px 10px;border-radius:12px" onclick="examFilter('jjf')">📜 经济法</span>
      <span style="background:var(--card);padding:3px 10px;border-radius:12px" onclick="examFilter('zl')">🎯 战略</span>
      <span style="background:var(--card);padding:3px 10px;border-radius:12px" onclick="examFilter('wrong')">❌ 错题</span>
    </div>
    <div id="examList"></div>
  `;
  w.innerHTML=html;
  examRenderList();
}

function examRenderList(){
  const container=document.getElementById('examList');
  let allQs=[];
  Object.keys(EXAMS).forEach(sub=>{
    EXAMS[sub].forEach((q,i)=>{
      const key=sub+'-'+i;
      allQs.push({...q,sub,idx:i,key});
    });
  });

  // filter
  if(examCurrentFilter==='jjf') allQs=allQs.filter(q=>q.sub==='jjf');
  else if(examCurrentFilter==='zl') allQs=allQs.filter(q=>q.sub==='zl');
  else if(examCurrentFilter==='wrong') allQs=allQs.filter(q=>examAnswered[q.key]===false);

  if(!allQs.length){
    container.innerHTML='<div class="exam-empty">🎉 没有符合条件的题目</div>';
    return;
  }

  let html='';
  allQs.forEach((q,qi)=>{
    const key=q.key;
    const ansState=examAnswered[key]; // true=correct, false=wrong, undefined=not answered
    const isMulti=typeof q.ans==='string';
    const label=isMulti?'【多选题】':'【单选题】';
    const subName=q.sub==='jjf'?'📜经济法':'🎯战略';

    html+=`<div class="exam-q" id="eq-${qi}">
      <div class="qhead"><span class="qtag">${label}</span> ${subName}</div>
      <div class="qtext">${q.q}</div>
      <div class="opts" id="opts-${qi}">`;

    q.opts.forEach((opt,oi)=>{
      const letter=String.fromCharCode(65+oi);
      let cls='opt';
      if(ansState!==undefined){
        cls+=' dis';
        // highlight correct answer
        if(isMulti){
          if(q.ans.includes(letter)) cls+=' cor';
        } else {
          if(oi===q.ans) cls+=' cor';
        }
        // highlight wrong answer
        if(ansState===false){
          if(isMulti){
            // if user selected this and it was wrong
          } else {
            if(oi!==q.ans && examAnswered[key+'_sel']===oi) cls+=' wro';
          }
        }
      }
      const selected=(examAnswered[key+'_sel']===oi)||(ansState!==undefined && isMulti && examAnswered[key+'_sel'] && examAnswered[key+'_sel'].includes(oi));
      if(selected && isMulti && ansState!==undefined){
        // mark selected wrong options
        if(!q.ans.includes(letter)) cls='opt dis wro';
      }

      html+=`<div class="${cls}" onclick="examAnswer('${key}',${oi},${qi},${isMulti})">
        ${letter}. ${opt.substring(3)}
      </div>`;
    });

    html+=`</div>`;

    if(ansState!==undefined){
      html+=`<div class="explain show" id="expl-${qi}">
        <div class="elb">💡 解析</div>
        <div class="eans">${ansState?'✅ 回答正确！':'❌ 回答错误'}</div>
        <div style="margin-top:4px">${q.explain}</div>
        <div class="elif">🎯 生活化理解：${q.life||''}</div>
      </div>`;
    }

    html+=`</div>`;
  });

  container.innerHTML=html;
}

function examAnswer(key,oi,qi,isMulti){
  const qidx=key;
  if(examAnswered[qidx]!==undefined) return; // already answered

  const sub=key.split('-')[0];
  const idx=parseInt(key.split('-')[1]);
  const q=EXAMS[sub][idx];

  // For single choice: save selection and answer immediately
  if(!isMulti){
    const correct=(oi===q.ans);
    examAnswered[qidx]=correct;
    examAnswered[qidx+'_sel']=oi;
    saveExam();
    examRenderList();
    return;
  }

  // For multi: toggle selection, need a confirm mechanism
  // Simple approach: store selections in temp, click again to submit
  if(!window._multiSel) window._multiSel={};
  if(!window._multiSel[key]) window._multiSel[key]=[];
  const arr=window._multiSel[key];
  const li=arr.indexOf(oi);
  if(li>=0) arr.splice(li,1);
  else arr.push(oi);

  // Update UI visually
  const opts=document.querySelectorAll(`#opts-${qi} .opt`);
  opts.forEach((el,i)=>{
    if(arr.includes(i)) el.classList.add('sel');
    else el.classList.remove('sel');
  });

  // Show submit button for multi
  let submitBtn=document.getElementById(`msub-${qi}`);
  if(!submitBtn && arr.length>0){
    const parent=document.getElementById(`opts-${qi}`);
    const btn=document.createElement('div');
    btn.id=`msub-${qi}`;
    btn.textContent='提交答案';
    btn.style.cssText='margin-top:8px;padding:8px 16px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;text-align:center';
    btn.onclick=function(){
      const ansArr=window._multiSel[key]||[];
      ansArr.sort();
      const ansLetters=ansArr.map(i=>String.fromCharCode(65+i)).join('');
      const correct=(ansLetters===q.ans);
      examAnswered[qidx]=correct;
      examAnswered[qidx+'_sel']=ansArr;
      saveExam();
      delete window._multiSel[key];
      examRenderList();
    };
    parent.appendChild(btn);
  } else if(submitBtn && arr.length===0){
    submitBtn.remove();
  }
}

function examFilter(f){
  examCurrentFilter=f;
  // Update active filter style
  document.querySelectorAll('.exam-info span').forEach(el=>{
    el.style.background='var(--card)';
    el.style.color='var(--text2)';
  });
  const spans=document.querySelectorAll('.exam-info span');
  const idx={'all':0,'jjf':1,'zl':2,'wrong':3}[f]||0;
  if(spans[idx]){
    spans[idx].style.background='var(--pri)';
    spans[idx].style.color='#fff';
  }
  examRenderList();
}

var mashState = {idx:0,queue:[],streak:0,maxStreak:0,score:0,total:0,mode:'rapid'};

function showMashupPage(){
  document.querySelectorAll('.scroll-wrap,.spec,.exam-wrap,.mash-wrap').forEach(e=>e.classList.remove('show'));
  document.querySelector('.sub-bar').style.display='flex';
  document.querySelector('.search-row').style.display='none';
  document.getElementById('statRow').style.display='none';

  // which mode: 'rapid' (快速刷) or 'compare' (对比记忆)
  const mode = mashState.mode;

  const w=document.getElementById('mashWrap');
  w.classList.add('show');

  if(mode==='compare'){
    renderComparePage(w);
    return;
  }

  // rapid fire mode
  if(mashState.queue.length===0 || mashState.idx>=mashState.queue.length){
    // build new queue from mashups
    let pool = MASHUPS.filter(m => {
      if(m.sub==='both') return true;
      const subject = m.sub==='jjf'?'jjf':'zl';
      // check what subject user is on - use sub preference
      return true; // always include all
    });
    // shuffle
    for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]]}
    mashState.queue = pool;
    mashState.idx = 0;
  }

  renderMashRapid(w);
}

function revealMash(){
  document.getElementById('mashLife')?.classList.add('show');
  document.getElementById('mashDetail')?.classList.add('show');

function mashAct(know){
  const m = mashState.queue[mashState.idx];
  if(!m) return;
  mashState.total++;
  if(know){
    mashState.score++;
    mashState.streak++;
    if(mashState.streak > mashState.maxStreak) mashState.maxStreak = mashState.streak;
  } else {
    mashState.streak = 0;
  }
  mashState.idx++;
  showMashupPage();
}

function mashSkip(){
  mashState.idx++;
  showMashupPage();
}

var fwSub='jjf';
function renderFramework(w){
  const f=FRAMEWORK[fwSub];
  let html=`
    <div class="fw-top">
      <div class="fwnm">${f.icon} ${f.name} — 知识体系全景图</div>
      <div class="fwdesc">${f.tagline}</div>
      <div class="fwstat">
        <span>📖 ${f.chapters.length} 章</span>
        <span>⭐ 星级越高越重要</span>
      </div>
    </div>
    <div class="fw-path">
      <div class="${fwSub==='jjf'?'active':''}" onclick="fwSub='jjf';renderFramework(document.getElementById('fwWrap'))">📜 经济法</div>
      <div class="${fwSub==='zl'?'active':''}" onclick="fwSub='zl';renderFramework(document.getElementById('fwWrap'))">🎯 战略</div>
    </div>
  `;

  // roadmap
  html+=`<div class="fw-roadmap">
    <div class="rhd">🗺️ 推荐学习路线</div>`;
  f.chapters.forEach((ch,i)=>{
    const icons=['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫'];
    html+=`<div class="rstep">
      <div class="rnum">${i+1}</div>
      <div class="rtxt"><b>${ch.n}</b> ${'⭐'.repeat(parseInt(ch.star)||1)} · 占比${ch.wt} · 难度${ch.diff}<br>${ch.ess}</div>
    </div>`;
  });
  html+=`</div>`;

  // chapter cards
  f.chapters.forEach((ch,i)=>{
    const stars='⭐'.repeat(ch.star)+(ch.star<5?'☆'.repeat(5-ch.star):'');
    html+=`
      <div class="fw-ch" onclick="fwToggle(this)">
        <div class="fchd">
          <span class="fnum">${('0'+(i+1)).slice(-2)}</span>
          <span class="fname">${ch.n}</span>
          <span class="fstar">${stars}</span>
        </div>
        <div class="fess">💡 ${ch.ess}</div>
        <div class="fmeta">
          <span class="fw">📊 分值 ${ch.wt}</span>
          <span class="fdiff">难度 ${ch.diff}</span>
        </div>
        <div class="fw-bigq">
          <span class="bqlb">🤔 学完这章你能回答：</span><br>
          ${ch.bigq.map((q,i)=>`${i+1}. ${q}`).join('<br>')}
        </div>
        <div class="fqslink">🔗 ${ch.links.join('<br>')}</div>
        <div class="ftip">💬 学习建议：${ch.tip}</div>
      </div>`;
  });

  w.innerHTML=html;
}

function fwToggle(el){
  ['fw-bigq','fqslink','ftip'].forEach(cls=>{
    const c=el.querySelector('.'+cls);
    if(c)c.classList.toggle('show');
  });
}
